version: '3'

includes:
  os:
    taskfile: ./dev/taskfile/Taskfile.{{OS}}.yml
    flatten: true
    silent: true
  build:
    taskfile: ./dev/taskfile/Taskfile.build.yml
    flatten: true
    silent: false
  test:
    taskfile: ./test/Taskfile.test.yml
    silent: false

dotenv: ['.env', '{{.ENV}}/.env', '{{.HOME}}/.env']
