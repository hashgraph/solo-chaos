version: '3'

env:
  SOLO_NAMESPACE: '{{.SOLO_NAMESPACE | default "solo"}}'
  SOLO_CLUSTER_NAME: '{{.SOLO_CLUSTER_NAME | default "solo"}}'

vars:
  UUID:
    sh: uuidgen | tr -d '-' | head -c 8 | tr '[:upper:]' '[:lower:]'

includes:
  utils:
    taskfile: Taskfile.utils.yml
    flatten: true
  consensus-node:
    taskfile: consensus-node/Taskfile.yml
  block-node:
    taskfile: block-node/Taskfile.yml

tasks:
  deploy-cluster-diagnostics:
    desc: Deploy cluster diagnostics pod labelled with REGION (standalone — does not trigger any chaos experiment)
    vars:
      REGION: '{{.REGION | default "us"}}'
    cmds:
      - echo "🔍 Validating environment variables..."
      - "{{.TASKFILE_DIR}}/validate-env.sh --require-region"
      - echo "🚀 Deploying cluster diagnostics pods with region={{.REGION}}..."
      - envsubst < {{.TASKFILE_DIR}}/../dev/k8s/cluster-diagnostics.yaml | kubectl apply -f -
      - echo "⏳ Waiting for cluster diagnostics pods to be ready..."
      - kubectl wait --for=condition=ready pod -l app=cluster-diagnostics -n {{.SOLO_NAMESPACE}} --timeout=120s
      - echo "✅ Cluster diagnostics pods deployed and ready."
    env:
      REGION: "{{.REGION}}"

  exec-cluster-diagnostics:
    desc: Exec into the cluster diagnostics pod for network testing
    interactive: true
    vars:
      NAMESPACE: "{{.NAMESPACE | default .SOLO_NAMESPACE}}"
    cmds:
      - echo "🔍 Validating environment variables..."
      - "{{.TASKFILE_DIR}}/validate-env.sh --require-namespace"
      - |
        echo "🔄 Exec into cluster diagnostics pod..."
        POD=$(kubectl get pods -n "${NAMESPACE}" -l app=cluster-diagnostics -o jsonpath="{.items[0].metadata.name}")
        if [[ -n "$POD" ]]; then
          echo "Pod found: $POD"
          echo "Running exec..."
          kubectl exec -it -n "${NAMESPACE}" "$POD" -- /bin/bash
        else
          echo "❌ No cluster diagnostics pod found in namespace '${NAMESPACE}'"
          exit 1
        fi
    env:
      NAMESPACE: "{{.NAMESPACE}}"

  cleanup-networkchaos:
    desc: Delete all NetworkChaos resources
    cmds:
      - echo "🧹 Cleaning up NetworkChaos experiments..."
      - kubectl delete networkchaos --all -n chaos-mesh --ignore-not-found=true
      - echo "✅ NetworkChaos cleanup completed."

  cleanup-podchaos:
    desc: Delete all PodChaos resources
    cmds:
      - echo "🧹 Cleaning up PodChaos experiments..."
      - kubectl delete podchaos --all -n chaos-mesh --ignore-not-found=true
      - echo "✅ PodChaos cleanup completed."

  cleanup-all:
    desc: Delete all chaos experiments and cluster diagnostics (full teardown)
    cmds:
      - task: cleanup-networkchaos
      - task: cleanup-podchaos
      - task: cleanup-cluster-diagnostics
      - echo "✅ Full chaos teardown completed."

  cleanup-cluster-diagnostics:
    desc: Remove cluster diagnostics pod and related resources
    vars:
      NAMESPACE: "{{.NAMESPACE | default .SOLO_NAMESPACE}}"
    cmds:
      - echo "🔍 Validating environment variables..."
      - "{{.TASKFILE_DIR}}/validate-env.sh --require-namespace"
      - echo "🧹 Cleaning up cluster diagnostics pods..."
      - kubectl delete deployment cluster-diagnostics -n ${NAMESPACE} --ignore-not-found=true
      - kubectl delete service cluster-diagnostics-svc -n ${NAMESPACE} --ignore-not-found=true
      - kubectl delete configmap cluster-diagnostics-cm -n ${NAMESPACE} --ignore-not-found=true
      - kubectl delete serviceaccount cluster-diagnostics-sa -n ${NAMESPACE} --ignore-not-found=true
      - kubectl delete clusterrole cluster-diagnostics-role --ignore-not-found=true
      - kubectl delete clusterrolebinding cluster-diagnostics-role-binding --ignore-not-found=true
      - echo "✅ Cluster diagnostics cleanup completed."
    env:
      NAMESPACE: "{{.NAMESPACE}}"
