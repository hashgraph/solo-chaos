version: '3'

includes:
  root:
    taskfile: Taskfile.root.yml
    flatten: true
  chaos:
    taskfile: ../../chaos/Taskfile.yml

tasks:
  doctor:
    desc: Check environment dependencies for Solo network
    cmds:
      - task check-docker
      - |
        echo "🔍 Checking required CLI tools..."
        for cmd in docker kubectl k9s kind helm jq kubectx envsubst; do
          if ! command -v $cmd >/dev/null 2>&1; then
            echo "❌ Missing: $cmd"
            echo "👉 Please, run: task setup"
            exit 1
          else
            echo "✅ $cmd found: $(command -v $cmd)"
          fi
        done
      - |
        echo "🔍 Checking optional tools..."
        for cmd in k9s; do
          if ! command -v $cmd >/dev/null 2>&1; then
            echo "⚠️  Missing (optional): $cmd"
          else
            echo "✅ $cmd found: $(command -v $cmd)"
          fi
        done
      - |
        echo "🔍 Checking Node.js & NVM..."
        export NVM_DIR="$HOME/.nvm"
        bash -c "
          source \"$NVM_DIR/nvm.sh\"
          if ! command -v nvm >/dev/null 2>&1; then
            echo '❌ NVM not installed'
            echo "👉 Please, run: task setup"
            exit 1
          else
            echo '✅ NVM installed'
            if ! nvm ls {{.NODEJS_VERSION}} | grep -q '{{.NODEJS_VERSION}}'; then
              echo '⚠️  Node.js {{.NODEJS_VERSION}} not installed in NVM'
            else
              echo '✅ Node.js {{.NODEJS_VERSION}} available'
            fi
          fi
          echo '🔍 Checking npm package @hashgraph/solo...'
          if ! npm list -g | grep -q '@hashgraph/solo'; then
            echo '⚠️  @hashgraph/solo not installed globally'
          else
            echo '✅ @hashgraph/solo is installed'
          fi
        "
        echo "✅ Doctor checks completed."
      - |
        echo "🔍 Checking npm package @hashgraph/solo..."
        if ! command -v node >/dev/null 2>&1; then
          echo "❌ Node.js not found. Exiting."
          echo ""
          echo "👉 Activate Node.js ${NODEJS_VERSION} in your current shell and re-run:"
          echo "nvm use ${NODEJS_VERSION} && task doctor"
          exit 1
        fi
        if ! npm list -g | grep -q '@hashgraph/solo'; then
          echo "⚠️  @hashgraph/solo not installed globally"
        else
          echo "✅ @hashgraph/solo is installed"
        fi
      - echo "✅ Doctor checks completed."
  
  setup:
    desc: Initialize the environment (idempotent)
    silent: true
    cmds:
      - |
        echo "🔍 Checking and installing required CLI tools..."
        for cmd in kubectl k9s kind helm jq kubectx; do
          if ! command -v $cmd &> /dev/null; then
            echo "⬇️  Installing $cmd..."
            brew install $cmd
          else
            echo "✅ $cmd already installed"
          fi
        done
        if ! command -v envsubst &> /dev/null; then
          echo "⬇️  Installing gettext (for envsubst)..."
          brew install gettext
        else
          echo "✅ gettext already installed"
        fi
      - |
        echo "🔍 Checking NVM..."
        export NVM_DIR="$HOME/.nvm"
        if [ ! -f "$NVM_DIR/nvm.sh" ]; then
          echo "⬇️  Installing NVM..."
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
        else
          echo "✅ NVM already installed"
        fi
      - |
        echo "🔍 Checking Node.js version...${NODEJS_VERSION}"
        export NVM_DIR="$HOME/.nvm"
        bash -c "
          source \"$NVM_DIR/nvm.sh\"
          if ! nvm ls ${NODEJS_VERSION} | grep -q \"${NODEJS_VERSION}\"; then
            echo \"⬇️  Installing Node.js ${NODEJS_VERSION}...\"
            nvm install ${NODEJS_VERSION}
          else
            nvm use ${NODEJS_VERSION}
          fi
          echo \"✅ Node.js ${NODEJS_VERSION} is available\"
        "
      - |
        echo "🔍 Checking @hashgraph/solo..."
        if ! command -v node >/dev/null 2>&1; then
        echo "❌ Node.js not found. Exiting."
        echo ""
        echo "👉 Activate Node.js ${NODEJS_VERSION} in your current shell and re-run:"
        echo "nvm use ${NODEJS_VERSION} && task setup"
        exit 1
        fi
        
        if ! npm list -g @hashgraph/solo | grep -q "solo@${SOLO_VERSION}"; then
        echo "⚠️  @hashgraph/solo@${SOLO_VERSION} not installed globally"
        else
        echo "✅ @hashgraph/solo@${SOLO_VERSION} is installed"
        fi
        
        echo "Using Node.js $(node -v) from $(which node)"
        if ! npm list -g @hashgraph/solo | grep -q "solo@${SOLO_VERSION}"; then
          echo "⬇️  Installing @hashgraph/solo@${SOLO_VERSION}..."
          npm install -g @hashgraph/solo@${SOLO_VERSION}
        else
          echo "✅ @hashgraph/solo@${SOLO_VERSION} already installed"
        fi
      - echo "🎉 Environment initialization complete!"

  reset:
    desc: Rollback environment initialization
    silent: true
    cmds:
      - |
        echo "🧹 Removing docker registry cache ..."
        docker stop docker_registry_proxy || true
        rm -rf $HOME/docker_mirror_cache || true
        rm -rf $HOME/docker_mirror_certs || true
      - |
        echo "🧹 Removing @hashgraph/solo..."
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        if npm list -g | grep -q '@hashgraph/solo'; then
          npm uninstall -g @hashgraph/solo
        fi
      - |
        echo "🧹 Removing Kind cluster..."
        if kind get clusters | grep -q "${SOLO_CLUSTER_NAME}"; then
          kind delete cluster --name "${SOLO_CLUSTER_NAME}"
          echo "✅ Cluster ${SOLO_CLUSTER_NAME} deleted"
        else
          echo "ℹ️  No cluster named ${SOLO_CLUSTER_NAME} found"
        fi
      - |
        echo "🧹 Removing CLI tools..."
        for cmd in kubectl k9s kind helm; do
          if command -v $cmd &> /dev/null; then
            echo "🧹 Uninstalling $cmd..."
            brew uninstall $cmd || true
          fi
        done
      - |
        echo "🧹 Cleaning up ~/.solo..."
        rm -rf ~/.solo || true
        echo "✅ Cleanup complete"

  
